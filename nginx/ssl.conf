# Configuração SSL/TLS - Vya Nexus
# Este arquivo contém as configurações de segurança SSL/TLS
# Copie este arquivo para /etc/nginx/conf.d/ no servidor de produção

# Configurações SSL Modernas (Mozilla Intermediate)
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# HSTS (HTTP Strict Transport Security)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Segurança adicional
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

# Certificados Let's Encrypt
# Após gerar com certbot, use os seguintes caminhos:
# ssl_certificate /etc/letsencrypt/live/vyaconcept.com.br/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/vyaconcept.com.br/privkey.pem;

# Resolver para validação OCSP
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# OCSP Stapling (opcional, para melhor performance)
# ssl_stapling on;
# ssl_stapling_verify on;
# ssl_trusted_certificate /etc/letsencrypt/live/vyaconcept.com.br/chain.pem;
