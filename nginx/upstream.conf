# Upstream Servers - Vya Nexus
# Este arquivo define os servidores upstream para cada serviço do Vya Nexus
# Copie este arquivo para /etc/nginx/conf.d/ no servidor de produção

upstream vya_nexus_dashboard {
    server localhost:3000;
    keepalive 32;
}

upstream vya_nexus_admin {
    server localhost:3004;
    keepalive 32;
}

upstream vya_nexus_cloud {
    server localhost:3001;
    keepalive 32;
}

upstream vya_nexus_email {
    server localhost:3002;
    keepalive 32;
}

upstream vya_nexus_hosting {
    server localhost:3003;
    keepalive 32;
}
