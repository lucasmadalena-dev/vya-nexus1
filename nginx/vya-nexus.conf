# Configuração Nginx - Vya Nexus
# Este arquivo contém as rotas para todos os subdomínios do Vya Nexus
# Copie este arquivo para /etc/nginx/sites-available/ no servidor de produção
# Depois crie um link simbólico em /etc/nginx/sites-enabled/

# Incluir configurações de upstream
include /etc/nginx/conf.d/upstream.conf;
include /etc/nginx/conf.d/ssl.conf;

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nexus.vyaconcept.com.br admin-nexus.vyaconcept.com.br cloud.vyaconcept.com.br email.vyaconcept.com.br hosting.vyaconcept.com.br;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================================
# HTTPS - Painel Principal do Vya Nexus (nexus.vyaconcept.com.br)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus.vyaconcept.com.br;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/vyaconcept.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vyaconcept.com.br/privkey.pem;

    # Logs
    access_log /var/log/nginx/nexus-access.log;
    error_log /var/log/nginx/nexus-error.log;

    # Tamanho máximo de upload
    client_max_body_size 100M;

    location / {
        proxy_pass http://vya_nexus_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://vya_nexus_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

