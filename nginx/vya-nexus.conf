# ============================================================================
# HTTPS - Vya Cloud (cloud.vyaconcept.com.br)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud.vyaconcept.com.br;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/vyaconcept.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vyaconcept.com.br/privkey.pem;

    # Logs
    access_log /var/log/nginx/cloud-access.log;
    error_log /var/log/nginx/cloud-error.log;

    # Tamanho máximo de upload para storage
    client_max_body_size 5G;

    location / {
        proxy_pass http://vya_nexus_cloud;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://vya_nexus_cloud;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

